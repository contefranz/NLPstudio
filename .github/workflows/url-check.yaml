name: URL check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  url-check:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::urlchecker
          needs: check

      - name: Check README and package URLs
        run: |
          extract_markdown_urls <- function(path) {
            lines <- readLines(path, warn = FALSE, encoding = "UTF-8")
            lines <- gsub("!\\[[^]]*\\]\\([^)]*\\)", "image", lines, perl = TRUE)
            matches <- gregexpr("\\[[^]]*\\]\\(([^)[:space:]]+)(?:[[:space:]][^)]+)?\\)", lines, perl = TRUE)
            raw <- unlist(regmatches(lines, matches), use.names = FALSE)
            urls <- sub("^\\[[^]]*\\]\\(([^)[:space:]]+).*$", "\\1", raw, perl = TRUE)
            urls <- unique(urls[grepl("^(https?|mailto):", urls)])
            urls[!grepl("^https://github\\.com/contefranz/NLPstudio(?:/|$)", urls)]
          }

          package_urls <- tools:::url_db_from_package_sources(".")
          readme_urls <- extract_markdown_urls("README.md")
          readme_db <- data.frame(
            URL = readme_urls,
            Parent = rep("README.md", length(readme_urls)),
            stringsAsFactors = FALSE
          )
          url_db <- unique(rbind(package_urls, readme_db))

          results <- urlchecker::url_check(".", db = url_db, progress = FALSE)
          if (NROW(results)) {
            print(results)
            quit(status = 1)
          }
        shell: Rscript {0}
